<!DOCTYPE html>
<html>

<head>
    <title>Oryon.AI</title>

    <style>

body {
    margin: 0;
    padding-top: 130px;

    background:
    radial-gradient(circle at top center,
    rgba(0, 140, 255, 0.35) 0%,
    rgba(0, 80, 160, 0.15) 25%,
    rgba(15,15,15,1) 60%);

    background-color: #0f0f0f;

    background-repeat: no-repeat;

    color: white;
    font-family: Arial, sans-serif;
    text-align: center;

    min-height: 100vh;
}

/* NAVBAR */
.navbar {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;

    padding: 15px 30px;

    background: linear-gradient(
        to bottom,
        #1f3558 0%,
        #1a2f4d 40%,
        rgba(15,15,15,0.95) 80%,
        #0f0f0f 100%
    );

    backdrop-filter: blur(8px);

    box-shadow: 0 5px 30px rgba(0,0,0,0.4);
}

/* LOGO */
.logo {
    display: flex;
    align-items: center;
    gap: 10px;
}

.logo span {
    font-size: 28px;
    font-weight: bold;
}

.logo img {
    width: 40px;
}

/* FORM */
form {
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* INPUT */
input {
    width: 400px;
    padding: 15px;
    border-radius: 30px;
    border: none;
    outline: none;
    font-size: 16px;

    transition: 0.3s;

    background: rgba(255,255,255,0.9);
}
input:focus {

    box-shadow: 0 0 20px rgba(0,195,255,0.5);

    transform: scale(1.02);

}
/* BUTTON */
button {
    margin-top: 20px;
    padding: 12px 30px;
    border-radius: 30px;
    border: none;
    background: #1f3b6f;
    color: white;
    cursor: pointer;
}

/* HASIL */
.hasil {
    margin-top: 40px;
    background: rgba(255,255,255,0.05);
    padding: 35px;
    border-radius: 25px;
    width: 70%;
    margin-left: auto;
    margin-right: auto;
    text-align: left;

    line-height: 1.8;
    font-size: 17px;

    color: #f1f1f1;

    box-shadow: 0 0 30px rgba(0,0,0,0.4);

    animation: fadeIn 1s ease;
    backdrop-filter: blur(10px);
border: 1px solid rgba(255,255,255,0.05);
}
#output {

    white-space: pre-line;

    line-height: 1.9;

    font-size: 17px;

    color: #eaeaea;

    word-wrap: break-word;

}
/* LOADING */
.loading {
    margin-top: 20px;
    color: #00ffff;
}
.logo span {
    font-size: 28px;
    font-weight: bold;
    border-bottom: 2px solid #ffffff;
    padding-bottom: 5px;
}

button {
    margin-top: 20px;
    padding: 14px 35px;
    border-radius: 30px;
    border: none;
    background: linear-gradient(135deg, #1f3b6f, #00c3ff);
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px rgba(0, 195, 255, 0.6);
}

@keyframes fadeIn {

    from {
        opacity: 0;
        transform: translateY(20px);
    }

    to {
        opacity: 1;
        transform: translateY(0);
    }

}
/* SPINNER */

.spinner {

    width: 45px;

    height: 45px;

    border: 5px solid rgba(255,255,255,0.2);

    border-top: 5px solid #00c3ff;

    border-radius: 50%;

    margin: 0 auto 15px;

    animation: spin 1s linear infinite;

}

/* ANIMASI MUTER */

@keyframes spin {

    0% {
        transform: rotate(0deg);
    }

    100% {
        transform: rotate(360deg);
    }

}   
    pre {

    white-space: pre-wrap;

    word-wrap: break-word;

    font-family: Arial, sans-serif;

    line-height: 1.8;

    color: #f1f1f1;

}
    </style>

</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo">
        <span>Oryon</span>
        <img src="{{ url_for('static', filename='oryon.png') }}">
    </div>
</div>

<!-- TITLE -->
<h2>Turn long information into instant understanding.</h2>

<!-- FORM -->
<form method="POST" onsubmit="showLoading()">

    <input type="text" name="url" placeholder="enter link" required>

    <button type="submit">Summarize</button>

</form>

<!-- LOADING -->
<div id="loading" class="loading" style="display:none;">

    <div class="spinner"></div>

    <p>Analyzing information...</p>

</div>

<!-- HASIL -->
{% if hasil %}

<div class="hasil">

    <h3>Summary</h3>

    <div id="output">
    <pre>{{ hasil }}</pre>
</div>

</div>

{% endif %}
<script>

function showLoading() {
    document.getElementById("loading").style.display = "block";
}

</script>
{% if hasil %}

{% endif %}

</body>
</html>
